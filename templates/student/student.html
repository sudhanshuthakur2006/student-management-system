<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Info Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-700 min-h-screen p-6">

  <!-- Header -->
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold text-gray-100">Student Info Dashboard</h1>
    <a href="/student/add_student" class="bg-blue-600 text-white px-5 py-2 rounded-xl shadow hover:bg-blue-700 transition">
      + Add Student
    </a>
  </div>

  <!-- Student Cards Grid -->
  <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
      {% for student in student_data %}
        <div class="bg-white p-6 rounded-2xl shadow hover:shadow-lg transition gap-4">
          <h2 class="text-xl font-semibold mb-2">{{ student.name }}</h2>
          <p class="text-gray-600">Email: {{ student.email }}</p>
          <p class="text-gray-600 mb-4">Phone Number:+91 {{ student.phone_number }}</p>

          <div class="flex gap-2">
            <button class="flex-1 bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">
              Read
            </button>
            <button class="flex-1 bg-yellow-500 text-white py-2 rounded-lg hover:bg-yellow-600 transition">
              Update
            </button>
            <button class="flex-1 bg-red-500 text-white py-2 rounded-lg hover:bg-red-600 transition">
              Delete
            </button>
          </div>
        </div>
      {% endfor %}
    </div>
</body>
</html>
